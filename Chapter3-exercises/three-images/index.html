<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Cities Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Modern Cities Gallery</h1>

<div class="image-container">
    <img src="City Skyline at Sunset.png" 
         alt="Skyline of a modern city with tall buildings at sunset"
         title="City Skyline at Sunset"
         width="300" height="200">
    <p class="license">
        Image License: Free to use under Unsplash License
    </p>
</div>

<div class="image-container">
    <img src="City Night Lights.png" 
         alt="Night view of a city with bright lights and roads"
         title="City Night Lights"
         width="300" height="200">
    <p class="license">
        Image License: Free to use under Pexels License
    </p>
</div>

<div class="image-container">
    <img src="Modern Skyscrapers.png" 
         alt="Modern skyscrapers with glass buildings in daytime"
         title="Modern Skyscrapers"
         width="300" height="200">
    <p class="license">
        Image License: Free for commercial use (Unsplash)
    </p>
</div>

</body>
</html>
